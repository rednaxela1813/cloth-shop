name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ital_project
          POSTGRES_USER: ital_project
          POSTGRES_PASSWORD: ital_project
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ital_project -d ital_project"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: project

    env:
      DJANGO_SETTINGS_MODULE: ital.settings.dev
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      DB_NAME: ital_project
      DB_USER: ital_project
      POSTGRES_PASSWORD: ital_project
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      TIME_ZONE: UTC
      LANGUAGE_CODE: en-us
      STATIC_URL: /static/
      MEDIA_URL: /media/
      CONTACT_SEND_ENABLED: "False"
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      ORDER_ACCESS_TOKEN_MAX_AGE: "7200"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django deploy checks
        run: python manage.py check --deploy

      - name: Architecture guardrails
        run: python scripts/check_architecture.py

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: pytest
