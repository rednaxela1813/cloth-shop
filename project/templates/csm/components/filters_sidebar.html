<div class="rounded-2xl border border-zinc-200 bg-white p-4">
  <p class="text-sm font-medium text-zinc-900">Filters</p>
  <form method="get" class="mt-4 space-y-4">
    {% if request.GET.sort %}
      <input type="hidden" name="sort" value="{{ request.GET.sort }}">
    {% endif %}
    {% if request.GET.q %}
      <input type="hidden" name="q" value="{{ request.GET.q }}">
    {% endif %}

    <div>
      <label for="filter-brand" class="block text-xs font-medium uppercase tracking-wide text-zinc-500">Brand</label>
      <select id="filter-brand" name="brand" class="mt-1 w-full rounded-lg border border-zinc-300 bg-white px-3 py-2 text-sm">
        <option value="">All brands</option>
        {% for brand in brands %}
          <option value="{{ brand }}" {% if selected_brand == brand %}selected{% endif %}>{{ brand }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="grid grid-cols-2 gap-2">
      <div>
        <label for="filter-min-price" class="block text-xs font-medium uppercase tracking-wide text-zinc-500">Min €</label>
        <input id="filter-min-price" type="number" min="0" step="0.01" name="min_price" value="{{ selected_min_price }}" class="mt-1 w-full rounded-lg border border-zinc-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label for="filter-max-price" class="block text-xs font-medium uppercase tracking-wide text-zinc-500">Max €</label>
        <input id="filter-max-price" type="number" min="0" step="0.01" name="max_price" value="{{ selected_max_price }}" class="mt-1 w-full rounded-lg border border-zinc-300 px-3 py-2 text-sm">
      </div>
    </div>

    <label class="flex items-center gap-2 text-sm text-zinc-700">
      <input type="checkbox" name="in_stock" value="1" {% if in_stock_only %}checked{% endif %} class="rounded border-zinc-300">
      In stock only
    </label>

    <div class="flex items-center gap-2">
      <button type="submit" class="rounded-lg bg-zinc-900 px-3 py-2 text-sm font-medium text-white hover:bg-zinc-800">
        Apply
      </button>
      <a href="{% url 'products:list' %}" class="rounded-lg border border-zinc-300 px-3 py-2 text-sm hover:bg-zinc-50">
        Reset
      </a>
    </div>
  </form>
</div>
