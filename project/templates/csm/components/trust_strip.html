<section class="mt-8">
  <div class="rounded-3xl border border-zinc-200 bg-white p-6 sm:p-8">
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      <!-- 1 -->
      <div class="flex items-start gap-4">
        <div class="mt-0.5 grid h-10 w-10 place-items-center rounded-2xl bg-zinc-900 text-white">
          <!-- check icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold">Autentické kúsky</p>
          <p class="mt-1 text-sm text-zinc-600">Overené predajcami a platformou.</p>
        </div>
      </div>

      <!-- 2 -->
      <div class="flex items-start gap-4">
        <div class="mt-0.5 grid h-10 w-10 place-items-center rounded-2xl bg-zinc-900 text-white">
          <!-- truck icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7h11v10H3z" />
            <path d="M14 10h4l3 3v4h-7z" />
            <path d="M7 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" />
            <path d="M17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold">Rýchle doručenie</p>
          <p class="mt-1 text-sm text-zinc-600">Express typicky 2–4 pracovné dni.</p>
        </div>
      </div>

      <!-- 3 -->
      <div class="flex items-start gap-4">
        <div class="mt-0.5 grid h-10 w-10 place-items-center rounded-2xl bg-zinc-900 text-white">
          <!-- tag icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41 11 3H3v8l9.59 9.59a2 2 0 0 0 2.82 0l5.18-5.18a2 2 0 0 0 0-2.82Z"/>
            <path d="M7 7h.01" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold">Férové ceny</p>
          <p class="mt-1 text-sm text-zinc-600">Ušetríte typicky 30–40% oproti bežným cenám.</p>
        </div>
      </div>

      <!-- 4 -->
      <div class="flex items-start gap-4">
        <div class="mt-0.5 grid h-10 w-10 place-items-center rounded-2xl bg-zinc-900 text-white">
          <!-- shield icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold">Bezpečné nákupy</p>
          <p class="mt-1 text-sm text-zinc-600">Ochrana platieb a transparentné podmienky.</p>
        </div>
      </div>
    </div>
  </div>
</section>
