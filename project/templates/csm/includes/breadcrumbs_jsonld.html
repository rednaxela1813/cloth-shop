{# project/templates/csm/includes/breadcrumbs_jsonld.html #}
{% load seo_tags %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {% for crumb in breadcrumbs %}
      {
        "@type": "ListItem",
        "position": {{ forloop.counter }},
        "name": "{{ crumb.title|escapejs }}",
        "item": "{{ request|absurl:crumb.url|escapejs }}"
      }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
