{% load static %}
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-zinc-200">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center gap-4">
      <!-- Logo -->
      <a href="{% url 'pages:home' %}" class="flex items-center gap-2">
        <img src="{% static 'csm/img/logo_2.png' %}" alt="Logo" class="h-27 w-27">
        <span class="text-sm font-semibold tracking-wide uppercase">Ricotti</span>
      </a>

      <!-- Primary nav -->
      <nav class="hidden md:flex items-center gap-6 ml-6 text-sm">
        <a href="{% url 'catalog:category' slug='women' %}" class="hover:text-zinc-600">Women</a>
        <a href="{% url 'catalog:category' slug='men' %}" class="hover:text-zinc-600">Men</a>
        <a href="{% url 'catalog:category' slug='kids' %}" class="hover:text-zinc-600">Kids</a>
        <a href="{% url 'pages:contact' %}" class="hover:text-zinc-600">Kontakt</a>
        {% comment %} <a href="{% url 'catalog:brands' %}" class="hover:text-zinc-600">Brands</a> 
        <a href="{% url 'catalog:sale' %}" class="text-rose-600 hover:text-rose-500 font-medium">Sale</a> {% endcomment %}
      </nav>

      <!-- Search -->
      <div class="flex-1">
        <form method="get" action="{% url 'products:list' %}" class="w-full">
          <label class="sr-only" for="q">Search</label>
          <div class="relative">
            <input id="q" name="q" value="{{ request.GET.q|default:'' }}"
              class="w-full rounded-full border border-zinc-300 bg-white px-4 py-2 pl-10 text-sm
                     focus:outline-none focus:ring-2 focus:ring-zinc-900"
              placeholder="Hľadať značky, oblečenie, topánky, doplnky…">
            <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500">
              <!-- simple magnifier -->
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </span>
          </div>
        </form>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <a href="" class="hidden sm:inline text-sm hover:text-zinc-600">Account</a>
        

        <a href="{% url 'cart:detail' %}" class="relative inline-flex items-center rounded-full border border-zinc-300 px-3 py-2 text-sm hover:bg-zinc-50">
          Cart
          {% if cart_count %}
            <span class="ml-2 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-zinc-900 px-1.5 text-xs text-white">
              {{ cart_count }}
            </span>
          {% endif %}
        </a>
      </div>
    </div>
  </div>
</header>
