services:
  web:
    build:
      context: .
    environment:
      DJANGO_SETTINGS_MODULE: ital.settings.prod
    env_file:
      - ./.env.prod
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:15-alpine
    env_file:
      - ./.env.prod
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
